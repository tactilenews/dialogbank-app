name: "Project Setup"
description: "Standard setup including pnpm, Node, and secrets"
runs:
  using: "composite"
  steps:
    - name: Fetch secrets from Infisical
      uses: Infisical/secrets-action@v1.0.9
      with:
        method: "oidc"
        identity-id: "b4a2a01a-d164-41de-bfbc-7098c791d475"
        domain: "https://eu.infisical.com"
        project-slug: "dialogbank"
        env-slug: "test"

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
